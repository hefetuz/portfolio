<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Halim Efe Tuzlu | Product Designer & CPO</title>
  <meta name="description" content="Istanbul-based Product Designer and CPO focused on AI products, design systems, UI/UX, brand identity, and product strategy.">
  <link rel="icon" href="assets/efe-avatar.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="rail" aria-label="Profile and services">
      <a class="profile" href="#top" aria-label="Home">
        <span class="avatar-media" aria-hidden="true">
          <video id="avatarVideo" class="avatar-video" muted playsinline preload="auto"></video>
          <canvas id="avatarCanvas" class="avatar-canvas" width="88" height="88"></canvas>
        </span>
        <span class="profile-copy">
          <span class="profile-default">
            <strong class="text-ui" data-text="site.brandName">Halim Efe Tuzlu</strong>
            <small class="text-ui text-muted" data-text="site.role">Product Designer & CPO</small>
          </span>
          <span class="profile-quote">
            <span class="text-hand">“Craft is knowing how to start, art is knowing when to stop”</span>
            <em>
              -Ben Affleck
              <img class="affleck-gif" src="assets/ben-affleck-regret.gif" alt="Ben Affleck smoking">
            </em>
          </span>
        </span>
      </a>

      <section class="intro">
        <h1 class="text-body" data-intro-text="hero.headline" aria-label="Hi, I'm Efe, a product designer and CPO based in Istanbul, building AI products, design systems and memorable digital experiences."></h1>
      </section>

      <section class="services" id="services" aria-labelledby="services-title">
        <h2 class="text-heading" id="services-title">Services</h2>
        <div id="servicesList"></div>
        <div class="actions">
          <a class="btn primary btn-icon" id="emailLink" href="mailto:hefetuzlu@gmail.com">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M4 6.5h16v11H4z"></path>
              <path d="m4.5 7 7.5 6 7.5-6"></path>
            </svg>
            <span>Send Email</span>
          </a>
          <div class="social-tabs fill-glass" id="socialLinks" aria-label="Social links"></div>
        </div>
      </section>

      <footer class="footer">
        <div class="footer-meta text-ui text-mono text-muted">
          <time id="clock" datetime="">--</time>
          <div class="language-menu" data-language-menu>
            <button class="language-trigger text-ui text-mono" type="button" aria-haspopup="menu" aria-expanded="false">
              <span data-language-current>TR</span>
            </button>
            <div class="language-dropdown t-dropdown" data-origin="bottom-right" role="menu">
              <button type="button" role="menuitemradio" aria-checked="true" data-language="TR" aria-label="Turkish">
                <span>TR</span>
                <img class="language-flag" src="assets/flag-tr.webp" alt="" aria-hidden="true">
              </button>
              <button type="button" role="menuitemradio" aria-checked="false" data-language="EN" aria-label="English">
                <span>EN</span>
                <img class="language-flag" src="assets/flag-gb.webp" alt="" aria-hidden="true">
              </button>
            </div>
          </div>
        </div>
      </footer>
      <section class="project-detail-panel" id="projectDetailPanel" aria-label="Project details" hidden></section>
    </aside>

    <main id="top" class="work-area">
      <div class="work-toolbar">
        <div class="segmented-control segmented-control-text filter-tabs fill-glass label-secondary" role="tablist" aria-label="Portfolio filters">
          <span class="tab-indicator" aria-hidden="true"></span>
        </div>

        <div class="segmented-control segmented-control-icon view-tabs fill-glass label-secondary" role="tablist" aria-label="Project view mode">
          <span class="tab-indicator" aria-hidden="true"></span>
        </div>
      </div>
      <section class="project-grid view-bento" id="work" aria-label="Selected work"></section>
      <div class="detail-visual-toolbar" id="projectVisualToolbar" hidden>
        <div class="segmented-control segmented-control-icon view-tabs detail-view-tabs fill-glass label-secondary" role="tablist" aria-label="Project visual view mode">
          <span class="tab-indicator" aria-hidden="true"></span>
        </div>
      </div>
      <section class="project-showcase" id="projectShowcase" aria-label="Project visuals" hidden></section>
    </main>
  </div>

  <div id="visualLightbox" class="visual-lightbox" role="dialog" aria-modal="true" aria-label="Expanded project visual" hidden>
    <button class="visual-lightbox-close text-ui" type="button" data-visual-lightbox-close aria-label="Close expanded visual">Close</button>
    <img id="visualLightboxImage" src="" alt="">
    <video id="visualLightboxVideo" controls playsinline hidden></video>
  </div>

  <svg width="0" height="0" aria-hidden="true" focusable="false" style="position:absolute">
    <filter id="tab-glass-distortion" x="0%" y="0%" width="100%" height="100%" filterUnits="objectBoundingBox">
      <feTurbulence type="fractalNoise" baseFrequency="0.0015 0.006" numOctaves="1" seed="24" result="noise"></feTurbulence>
      <feGaussianBlur in="noise" stdDeviation="7" result="softNoise"></feGaussianBlur>
      <feDisplacementMap in="SourceGraphic" in2="softNoise" scale="36" xChannelSelector="R" yChannelSelector="A"></feDisplacementMap>
    </filter>
  </svg>

  <script type="module" src="js/app.js"></script>
</body>
</html>
