<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Halim Efe Tuzlu | Product Designer & CPO</title>
  <meta name="description" content="Istanbul-based Product Designer and CPO focused on AI products, design systems, UI/UX, brand identity, and product strategy.">
  <link rel="icon" href="assets/efe-avatar.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="rail" aria-label="Profile and services">
      <a class="profile" href="#top" aria-label="Home">
        <img id="avatar" src="assets/efe-avatar.svg" alt="">
        <span>
          <strong data-text="site.brandName">Halim Efe Tuzlu</strong>
          <small data-text="site.role">Product Designer & CPO</small>
        </span>
      </a>

      <section class="intro">
        <h1 data-text="hero.headline">Hi, I'm Efe, a product designer and CPO based in Istanbul, building AI products, design systems and memorable digital experiences.</h1>
      </section>

      <section class="services" id="services" aria-labelledby="services-title">
        <h2 id="services-title">Services</h2>
        <div id="servicesList"></div>
        <div class="actions">
          <a class="btn primary" id="emailLink" href="mailto:hefetuzlu@gmail.com">Send Email</a>
          <a class="btn secondary" id="socialLink" href="https://www.behance.net/efetuzlu">Behance</a>
        </div>
      </section>

      <footer class="footer">
        <p><strong id="clock">--:--:--</strong> PM CET</p>
        <p data-text="footer.copyright">©2026 Halim Efe Tuzlu</p>
        <nav aria-label="Footer links">
          <a href="#top">Terms</a>
          <a href="#work">Imprint</a>
          <a href="admin.html">CMS</a>
        </nav>
      </footer>
    </aside>

    <main id="top" class="work-area">
      <div class="work-toolbar">
        <div class="tabs filter-tabs" role="tablist" aria-label="Portfolio filters">
          <span class="tab-indicator" aria-hidden="true"></span>
        </div>

        <div class="tabs view-tabs" role="tablist" aria-label="Project view mode">
          <span class="tab-indicator" aria-hidden="true"></span>
        </div>
      </div>
      <section class="project-grid view-bento" id="work" aria-label="Selected work"></section>
    </main>
  </div>

  <dialog id="projectDialog" class="dialog">
    <button class="dialog-close" type="button" aria-label="Close">×</button>
    <img id="dialogImage" src="assets/efe-avatar.svg" alt="">
    <div>
      <p id="dialogMeta"></p>
      <h2 id="dialogTitle"></h2>
      <p id="dialogDescription"></p>
    </div>
  </dialog>

  <script type="module" src="js/app.js"></script>
</body>
</html>
