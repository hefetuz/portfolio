<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portfolio CMS | Halim Efe Tuzlu</title>
  <meta name="description" content="Local CMS panel for managing portfolio content.">
  <link rel="icon" href="assets/efe-avatar.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="cms-page">
  <main class="cms-shell">
    <aside class="cms-sidebar" aria-label="CMS navigation">
      <div class="cms-brand">
        <p class="text-ui text-muted">Portfolio CMS</p>
        <h1 class="text-heading">Project Manager</h1>
      </div>
      <div class="cms-stats" id="cmsStats" aria-label="Project counts"></div>
      <div class="cms-actions">
        <button class="btn primary" id="cmsSave" type="button">Save Content</button>
        <button class="btn secondary" id="cmsExport" type="button">Export JSON</button>
        <a class="btn secondary" href="./#top">Open Site</a>
      </div>
      <p class="cms-status text-ui text-muted" id="cmsStatus" role="status">Loading content...</p>
    </aside>

    <section class="cms-content" aria-label="Projects">
      <header class="cms-toolbar">
        <div>
          <p class="text-ui text-muted">Content Source</p>
          <h2 class="text-heading">cms/content.json</h2>
        </div>
        <button class="btn secondary" id="cmsAddProject" type="button">Add Project</button>
      </header>

      <div class="cms-layout">
        <section class="cms-list-panel" aria-label="Project list">
          <div class="cms-list" id="cmsProjectList"></div>
        </section>

        <section class="cms-editor-panel" aria-label="Project editor">
          <form class="cms-editor" id="cmsProjectForm"></form>
        </section>
      </div>
    </section>
  </main>

  <script type="module" src="js/cms/admin.js"></script>
</body>
</html>
